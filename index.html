<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samurai's House Feedback Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #f0f0f0;
            padding: 20px;
        }
        .form-container {
            background-color: #444;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .star-rating {
            direction: row;
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }
        .star {
            font-size: 30px;
            color: gold;
            cursor: pointer;
        }
        .input-field {
            margin: 10px 0;
        }
        .input-field input, .input-field textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
        }
        .submit-btn {
            color: #fff;
            background-color: #008CBA;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Feedback Form</h1>
        <div class="star-rating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
        <div class="input-field">
            <input type="text" id="name" placeholder="Your Name" required>
        </div>
        <div class="input-field">
            <textarea id="feedback" placeholder="Your Feedback" required></textarea>
        </div>
        <button class="submit-btn">Submit</button>
    </div>
    <script>
        const stars = document.querySelectorAll('.star');
        let rating = 0;

        stars.forEach(star => {
            star.addEventListener('click', () => {
                rating = star.getAttribute('data-value');
                highlightStars(rating);
            });
        });

        function highlightStars(rating) {
            stars.forEach(star => {
                star.style.color = star.getAttribute('data-value') <= rating ? 'gold' : '#f0f0f0';
            });
        }

        document.querySelector('.submit-btn').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const feedback = document.getElementById('feedback').value;
            if (name && feedback && rating) {
                saveFeedback(name, feedback, rating);
                document.getElementById('name').value = '';
                document.getElementById('feedback').value = '';
                rating = 0;
                highlightStars(0);
            } else {
                alert('Please fill in all fields.');
            }
        });

        function saveFeedback(name, feedback, rating) {
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            feedbacks.push({ name, feedback, rating });
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
            alert('Feedback submitted!');
        }
    </script>
</body>
</html>
