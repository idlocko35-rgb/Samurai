<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samurai's House — Ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e2d9;
    --muted: #4a4540;
    --accent: #c8a96e;
    --red: #8b2020;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* HEADER */
  .header { margin-bottom: 2.5rem; }
  .kana { font-size:0.6rem; letter-spacing:0.25em; color:var(--accent); text-transform:uppercase; margin-bottom:0.75rem; display:block; }
  .brand { font-family:'Zen Old Mincho',serif; font-size:clamp(1.6rem,5vw,2rem); font-weight:900; line-height:1.1; }
  .brand span { color:var(--accent); }
  .headline { margin-top:0.9rem; font-size:0.82rem; line-height:1.7; color:#9e9890; letter-spacing:0.02em; }
  .headline em { font-style:normal; color:var(--text); }

  .divider { width:2rem; height:1px; background:var(--accent); margin:2rem 0; opacity:0.4; }

  /* FIELDS */
  .field-label { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; display:block; }
  .field-group { margin-bottom:1.5rem; }

  input[type="text"], textarea {
    width:100%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:0.8rem;
    font-weight:300; padding:0.85rem 1rem; outline:none;
    transition:border-color 0.2s; letter-spacing:0.02em; line-height:1.5;
  }
  input::placeholder, textarea::placeholder { color:var(--muted); }
  input:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:none; min-height:110px; }

  /* STARS */
  .stars { display:flex; gap:0.5rem; margin-bottom:0.5rem; }
  .star-btn { background:none; border:none; cursor:pointer; padding:0.2rem; transition:transform 0.1s; }
  .star-btn:hover { transform:scale(1.15); }
  .star-btn svg { width:1.8rem; height:1.8rem; fill:var(--border); stroke:var(--muted); stroke-width:1.5; transition:fill 0.15s,stroke 0.15s; }
  .star-btn.hovered svg { fill:var(--accent); stroke:var(--accent); }
  .rating-text { font-size:0.6rem; letter-spacing:0.15em; color:var(--accent); height:1em; margin-bottom:1.5rem; }

  /* SUBMIT */
  .submit { width:100%; padding:0.9rem; background:var(--accent); border:none; color:#0a0a0a; font-family:'DM Mono',monospace; font-size:0.7rem; font-weight:400; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:opacity 0.2s,transform 0.1s; }
  .submit:hover { opacity:0.85; }
  .submit:active { transform:scale(0.99); }
  .error-msg { font-size:0.6rem; letter-spacing:0.1em; color:var(--red); margin-top:0.75rem; min-height:1em; }

  /* SUCCESS */
  .success { display:none; text-align:center; padding:3rem 0; animation:fadeUp 0.6s ease both; }
  .success-mark { font-family:'Zen Old Mincho',serif; font-size:3rem; color:var(--accent); display:block; margin-bottom:1rem; }
  .success h2 { font-family:'Zen Old Mincho',serif; font-size:1.3rem; font-weight:700; margin-bottom:0.5rem; }
  .success p { font-size:0.7rem; letter-spacing:0.1em; color:var(--muted); }

  .footer-mark { margin-top:3rem; font-size:0.55rem; letter-spacing:0.15em; color:var(--border); text-align:center; }

  /* ADMIN TRIGGER */
  .admin-trigger { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.15em; padding:0.5rem 0.75rem; cursor:pointer; text-transform:uppercase; z-index:50; transition:border-color 0.2s,color 0.2s; }
  .admin-trigger:hover { border-color:var(--accent); color:var(--accent); }

  /* GATE */
  #admin-gate { display:none; position:fixed; inset:0; background:rgba(10,10,10,0.97); z-index:200; align-items:center; justify-content:center; padding:2rem; }
  #admin-gate.open { display:flex; }
  .gate-box { background:var(--surface); border:1px solid var(--border); padding:2rem; width:100%; max-width:300px; animation:fadeUp 0.3s ease both; }
  .gate-box h3 { font-family:'Zen Old Mincho',serif; font-size:1rem; margin-bottom:1.5rem; color:var(--accent); }
  .gate-error { font-size:0.6rem; letter-spacing:0.1em; color:var(--red); margin-top:0.5rem; min-height:1em; }
  .gate-btn { margin-top:1rem; width:100%; padding:0.8rem; background:var(--accent); border:none; color:#0a0a0a; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; }

  /* ADMIN PANEL */
  #admin-panel { display:none; position:fixed; inset:0; background:var(--bg); z-index:100; overflow-y:auto; padding:2rem 1.5rem; animation:fadeUp 0.4s ease both; }
  .admin-inner { max-width:600px; margin:0 auto; }

  .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1.25rem; }
  .admin-title { font-family:'Zen Old Mincho',serif; font-size:1.2rem; font-weight:900; }
  .admin-title span { color:var(--accent); }
  .close-admin { background:none; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.15em; padding:0.4rem 0.8rem; cursor:pointer; text-transform:uppercase; transition:border-color 0.2s,color 0.2s; }
  .close-admin:hover { border-color:var(--accent); color:var(--accent); }

  .admin-stats { display:flex; gap:1rem; margin-bottom:2rem; }
  .stat-box { flex:1; background:var(--surface); border:1px solid var(--border); padding:1rem; text-align:center; }
  .stat-num { font-family:'Zen Old Mincho',serif; font-size:1.8rem; color:var(--accent); display:block; line-height:1; }
  .stat-label { font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-top:0.4rem; display:block; }

  .submissions-list { display:flex; flex-direction:column; gap:1px; }
  .submission-card { background:var(--surface); border:1px solid var(--border); padding:1.1rem 1.2rem; transition:border-color 0.15s; }
  .submission-card:hover { border-color:#2a2a2a; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.5rem; gap:1rem; }
  .card-name { font-size:0.75rem; font-weight:400; letter-spacing:0.05em; color:var(--text); }
  .card-meta { display:flex; align-items:center; gap:0.6rem; flex-shrink:0; }
  .card-stars { display:flex; gap:1px; }
  .card-star { font-size:0.65rem; color:var(--muted); }
  .card-star.lit { color:var(--accent); }
  .card-time { font-size:0.55rem; letter-spacing:0.08em; color:var(--muted); }
  .card-comment { font-size:0.72rem; line-height:1.6; color:#9e9890; letter-spacing:0.02em; }
  .card-comment.empty { color:var(--muted); font-style:italic; }
  .empty-state { text-align:center; padding:3rem 0; color:var(--muted); font-size:0.7rem; letter-spacing:0.1em; }

  .clear-btn { margin-top:1.5rem; width:100%; padding:0.7rem; background:none; border:1px solid var(--red); color:var(--red); font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; opacity:0.6; transition:opacity 0.2s; }
  .clear-btn:hover { opacity:1; }
</style>
</head>
<body>

<!-- FORM -->
<div class="container">
  <div id="form-view">
    <div class="header">
      <span class="kana">侍の家 · AI Art Gallery</span>
      <h1 class="brand">Samurai's <span>House</span></h1>
      <p class="headline">Got ideas to <em>level up</em> our AI art gallery?<br>Drop them below — every thought counts.</p>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <label class="field-label" for="name-input">Your name</label>
      <input type="text" id="name-input" placeholder="Enter your name...">
    </div>

    <span class="field-label">Rate your experience</span>
    <div class="stars" id="stars">
      <button class="star-btn" data-val="1"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn" data-val="2"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn" data-val="3"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn" data-val="4"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn" data-val="5"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
    </div>
    <div class="rating-text" id="rating-text"></div>

    <div class="field-group">
      <label class="field-label" for="comment">Your idea or thought</label>
      <textarea id="comment" placeholder="What would make this gallery unforgettable?"></textarea>
    </div>

    <button class="submit" onclick="submitFeedback()">Submit</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="success" id="success-view">
    <span class="success-mark">礼</span>
    <h2>Thank you.</h2>
    <p>Your idea has been noted.</p>
  </div>

  <p class="footer-mark">Samurai's House · AI Art Gallery</p>
</div>

<!-- ADMIN TRIGGER -->
<button class="admin-trigger" onclick="openGate()">Admin ⊞</button>

<!-- GATE -->
<div id="admin-gate">
  <div class="gate-box">
    <h3>Admin Access</h3>
    <label class="field-label">Password</label>
    <input type="password" id="gate-pass" placeholder="Enter password..." onkeydown="if(event.key==='Enter')checkGate()">
    <div class="gate-error" id="gate-error"></div>
    <button class="gate-btn" onclick="checkGate()">Enter</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-inner">
    <div class="admin-header">
      <h2 class="admin-title">Submissions <span>Dashboard</span></h2>
      <button class="close-admin" onclick="closeAdmin()">✕ Close</button>
    </div>
    <div class="admin-stats" id="admin-stats"></div>
    <div class="submissions-list" id="submissions-list"></div>
    <button class="clear-btn" onclick="clearAll()">Clear all submissions</button>
  </div>
</div>

<script>
  const STORE_KEY = 'samurai_feedback';
  const ADMIN_PASS = 'samurai2025'; // ← change this to your password

  // Stars
  const labels = ['','Poor','Fair','Good','Great','Excellent'];
  let selected = 0;
  const btns = document.querySelectorAll('.star-btn');
  const ratingText = document.getElementById('rating-text');

  btns.forEach(btn => {
    btn.addEventListener('mouseenter', () => { highlight(+btn.dataset.val); ratingText.textContent = labels[+btn.dataset.val]; });
    btn.addEventListener('mouseleave', () => { highlight(selected); ratingText.textContent = selected ? labels[selected] : ''; });
    btn.addEventListener('click', () => { selected = +btn.dataset.val; highlight(selected); ratingText.textContent = labels[selected]; });
  });

  function highlight(val) {
    btns.forEach(b => b.classList.toggle('hovered', +b.dataset.val <= val));
  }

  // Storage
  function getAll() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
  function saveAll(arr) { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

  // Submit
  function submitFeedback() {
    const name = document.getElementById('name-input').value.trim();
    const comment = document.getElementById('comment').value.trim();
    const err = document.getElementById('error-msg');
    if (!name) { err.textContent = 'Please enter your name.'; return; }
    if (!selected) { err.textContent = 'Please select a rating.'; return; }
    err.textContent = '';

    const entry = {
      id: Date.now(), name, rating: selected, comment,
      time: new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })
    };
    const all = getAll();
    all.unshift(entry);
    saveAll(all);

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  }

  // Gate
  function openGate() {
    document.getElementById('admin-gate').classList.add('open');
    document.getElementById('gate-pass').value = '';
    document.getElementById('gate-error').textContent = '';
    setTimeout(() => document.getElementById('gate-pass').focus(), 100);
  }

  function checkGate() {
    if (document.getElementById('gate-pass').value === ADMIN_PASS) {
      document.getElementById('admin-gate').classList.remove('open');
      openAdmin();
    } else {
      document.getElementById('gate-error').textContent = 'Incorrect password.';
    }
  }

  document.getElementById('admin-gate').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  // Admin
  function openAdmin() {
    document.getElementById('admin-panel').style.display = 'block';
    renderAdmin();
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
  }

  function renderAdmin() {
    const all = getAll();
    const avg = all.length ? (all.reduce((s,e) => s + e.rating, 0) / all.length).toFixed(1) : '—';

    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-box"><span class="stat-num">${all.length}</span><span class="stat-label">Total</span></div>
      <div class="stat-box"><span class="stat-num">${avg}</span><span class="stat-label">Avg Rating</span></div>
      <div class="stat-box"><span class="stat-num">${all.filter(e=>e.comment).length}</span><span class="stat-label">With Ideas</span></div>
    `;

    const list = document.getElementById('submissions-list');
    if (!all.length) { list.innerHTML = '<div class="empty-state">No submissions yet.</div>'; return; }

    list.innerHTML = all.map(e => `
      <div class="submission-card">
        <div class="card-top">
          <span class="card-name">${esc(e.name)}</span>
          <div class="card-meta">
            <div class="card-stars">${[1,2,3,4,5].map(i=>`<span class="card-star ${i<=e.rating?'lit':''}"">★</span>`).join('')}</div>
            <span class="card-time">${e.time}</span>
          </div>
        </div>
        <div class="card-comment ${e.comment?'':'empty'}">${e.comment ? esc(e.comment) : 'No idea left.'}</div>
      </div>
    `).join('');
  }

  function clearAll() {
    if (confirm('Delete all submissions? This cannot be undone.')) {
      saveAll([]);
      renderAdmin();
    }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
